<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Escola Benedito Oliveira</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .alert-error-box {
            background-color: #ffe3e3;
            border-left: 5px solid #e74c3c;
            color: #c0392b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: shake 0.3s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Ajuste fino para acomodar perfeitamente os 3 botões lado a lado */
        .profile-selector-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .profile-buttons-container {
            display: flex;
            gap: 6px;
            width: 100%;
        }

        .profile-buttons-container .profile-btn {
            flex: 1;
            padding: 10px 4px;
            font-size: 11px; /* Um pouco menor para caber perfeitamente no mobile */
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            color: #666;
            transition: all 0.2s ease;
        }

        .profile-buttons-container .profile-btn i {
            font-size: 16px;
        }

        .profile-buttons-container .profile-btn.active {
            background: #b30000;
            color: #fff;
            border-color: #b30000;
        }
    </style>
</head>
<body>

    <div class="app-container login-page-bg">
        <main class="login-container">
            
            <div class="login-header">
                <div class="logo-wrapper">
                    <img src="/img/logo-escola.png" alt="Escudo Escola" class="school-big-logo">
                </div>
                <h2>Escola Benedito Oliveira</h2>
                <p>Faça login para continuar</p>
            </div>

            <form action="/login_processo" method="POST" class="login-form">

                {% if erro %}
                <div class="alert-error-box">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>Usuário, senha ou perfil incorretos!</span>
                </div>
                {% endif %}

                <div class="profile-selector-box">
                    <label class="input-label">Selecione seu perfil</label>
                    
                    <div class="profile-buttons-container">
                        <button type="button" class="profile-btn" data-perfil="diretor">
                            <i class="fas fa-user-shield"></i> Diretor
                        </button>
                        
                        <button type="button" class="profile-btn" data-perfil="professor">
                            <i class="fas fa-chalkboard-teacher"></i> Professor
                        </button>
                        
                        <button type="button" class="profile-btn active" data-perfil="responsavel">
                            <i class="fas fa-user-friends"></i> Responsável
                        </button>
                    </div>
                </div>

                <input type="hidden" id="perfil_selecionado" name="perfil" value="responsavel">
                
                <div class="input-group">
                    <label for="username" class="input-label">CPF ou E-mail</label>
                    <input type="text" id="username" name="username" placeholder="Digite seu CPF ou e-mail" required>
                </div>

                <div class="input-group">
                    <label for="password" class="input-label">Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                        <button type="button" class="toggle-password-btn" id="btn-toggle-pass"><i class="fas fa-eye"></i></button>
                    </div>
                </div>

                <a href="#" class="forgot-password">Esqueceu sua senha?</a>

                <button type="submit" class="submit-login-btn">Entrar</button>
            </form>

            <div class="login-footer">
                <p>Não tem uma conta? <a href="#">Solicite na secretaria.</a></p>
            </div>

        </main>
    </div>

    <script src="../js/script.js"></script>
    <script>
        // Lógica local para garantir o clique correto nos perfis e o funcionamento do olho da senha
        document.querySelectorAll('.profile-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.profile-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const perfil = this.getAttribute('data-perfil');
                document.getElementById('perfil_selecionado').value = perfil;
            });
        });

        const togglePassBtn = document.getElementById('btn-toggle-pass');
        if (togglePassBtn) {
            togglePassBtn.addEventListener('click', function() {
                const passInput = document.getElementById('password');
                const icon = this.querySelector('i');
                if (passInput.type === 'password') {
                    passInput.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    passInput.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });
        }
    </script>
</body>
</html>
