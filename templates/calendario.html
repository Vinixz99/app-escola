<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário Escolar - Escola Benedito Oliveira</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <header class="page-header">
            <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <h2>Calendário Escolar</h2>
            <div style="width: 32px;"></div>
        </header>

        <main class="page-content">
            
            <div class="calendar-list" style="padding: 20px;">
                
                {% if not lista_eventos %}
                    <div style="text-align: center; color: #999; padding: 40px 20px;">
                        <i class="fas fa-calendar-day" style="font-size: 48px; margin-bottom: 15px; color: #ccc;"></i>
                        <p>Nenhum evento letivo ou feriado programado no momento.</p>
                    </div>
                {% else %}
                    {% for evento in lista_eventos %}
                    <div class="calendar-card" style="display: flex; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 12px; align-items: center;">
                        <div class="calendar-date-box" style="background: #e3f2fd; color: #1e88e5; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; min-width: 60px; margin-right: 15px;">
                            <span style="font-size: 16px; display: block;">{{ evento.data }}</span>
                        </div>
                        <div class="calendar-details">
                            <h3 style="margin: 0; color: #333; font-size: 16px;">{{ evento.titulo }}</h3>
                            <p style="margin: 3px 0 0 0; color: #777; font-size: 13px;">Evento Escolar</p>
                        </div>
                    </div>
                    {% endfor %}
                {% endif %}

            </div>

        </main>

        <nav class="bottom-nav">
            <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i><span>Início</span></a>
            <a href="/entrada_saida_historico" class="nav-item"><i class="fas fa-history"></i><span>Histórico</span></a>
            <a href="/qrcode" class="nav-item scan-btn"><i class="fas fa-qrcode"></i></a>
            <a href="/perfil_responsavel" class="nav-item"><i class="fas fa-user-circle"></i><span>Perfil</span></a>
            <a href="/" class="nav-item"><i class="fas fa-sign-out-alt"></i><span>Sair</span></a>
        </nav>
    </div>

    <script src="../js/script.js"></script>
</body>
</html>
