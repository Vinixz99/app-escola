<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliações - Escola Benedito Oliveira</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <header class="page-header">
            <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <h2>Avaliações / Provas</h2>
            <div style="width: 32px;"></div>
        </header>

        <main class="page-content">
            
            <div class="avaliacoes-list" style="padding: 20px;">
                
                {% if not lista_provas %}
                    <div style="text-align: center; color: #999; padding: 40px 20px;">
                        <i class="fas fa-file-invoice" style="font-size: 48px; margin-bottom: 15px; color: #ccc;"></i>
                        <p>Nenhuma avaliação ou prova agendada para este bimestre.</p>
                    </div>
                {% else %}
                    {% for prova in lista_provas %}
                    <div class="prova-card" style="background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 12px; border-left: 5px solid #1e88e5;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center;">
                            <span style="font-weight: bold; color: #1e88e5; font-size: 16px;">{{ prova.disciplina }}</span>
                            <span style="font-size: 12px; background: #f5f5f5; color: #666; padding: 3px 8px; border-radius: 4px; font-weight: bold;"><i class="far fa-calendar-alt"></i> Data: {{ prova.data }}</span>
                        </div>
                        <p style="margin: 0; color: #444; font-size: 14px; line-height: 1.4;"><strong>Conteúdo:</strong> {{ prova.conteudo }}</p>
                    </div>
                    {% endfor %}
                {% endif %}

            </div>

        </main>

        <nav class="bottom-nav">
            <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i><span>Início</span></a>
            <a href="/entrada_saida_historico" class="nav-item"><i class="fas fa-history"></i><span>Histórico</span></a>
            <a href="/qrcode" class="nav-item scan-btn"><i class="fas fa-qrcode"></i></a>
            <a href="/perfil_responsavel" class="nav-item"><i class="fas fa-user-circle"></i><span>Perfil</span></a>
            <a href="/" class="nav-item"><i class="fas fa-sign-out-alt"></i><span>Sair</span></a>
        </nav>
    </div>

    <script src="../js/script.js"></script>
</body>
</html>
