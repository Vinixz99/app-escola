<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio do Lanche - Escola Benedito Oliveira</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <header class="page-header">
            <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <h2>Lanche Escolar</h2>
            <div style="width: 32px;"></div>
        </header>

        <main class="page-content" style="padding: 20px;">
            
            <div style="background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center;">
                <i class="fas fa-utensils" style="font-size: 32px; color: #2e7d32; margin-bottom: 10px;"></i>
                <h3 style="margin: 0; color: #333;">Cardápio da Semana</h3>
                <p style="margin: 5px 0 0 0; color: #777; font-size: 13px;">Acompanhe a alimentação dos alunos</p>
            </div>

            <div class="lanche-lista">
                
                <div style="background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 12px; border-left: 5px solid #2e7d32;">
                    <span style="font-size: 12px; font-weight: bold; color: #2e7d32; text-transform: uppercase;">Segunda-feira</span>
                    <p style="margin: 5px 0 0 0; color: #444; font-size: 15px;">{{ lanche.segunda }}</p>
                </div>

                <div style="background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 12px; border-left: 5px solid #2e7d32;">
                    <span style="font-size: 12px; font-weight: bold; color: #2e7d32; text-transform: uppercase;">Terça-feira</span>
                    <p style="margin: 5px 0 0 0; color: #444; font-size: 15px;">{{ lanche.terca }}</p>
                </div>

                <div style="background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 12px; border-left: 5px solid #2e7d32;">
                    <span style="font-size: 12px; font-weight: bold; color: #2e7d32; text-transform: uppercase;">Quarta-feira</span>
                    <p style="margin: 5px 0 0 0; color: #444; font-size: 15px;">{{ lanche.quarta }}</p>
                </div>

                <div style="background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 12px; border-left: 5px solid #2e7d32;">
                    <span style="font-size: 12px; font-weight: bold; color: #2e7d32; text-transform: uppercase;">Quinta-feira</span>
                    <p style="margin: 5px 0 0 0; color: #444; font-size: 15px;">{{ lanche.quinta }}</p>
                </div>

                <div style="background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 12px; border-left: 5px solid #2e7d32;">
                    <span style="font-size: 12px; font-weight: bold; color: #2e7d32; text-transform: uppercase;">Sexta-feira</span>
                    <p style="margin: 5px 0 0 0; color: #444; font-size: 15px;">{{ lanche.sexta }}</p>
                </div>

            </div>

        </main>

        <nav class="bottom-nav">
            <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i><span>Início</span></a>
            <a href="/entrada_saida_historico" class="nav-item"><i class="fas fa-history"></i><span>Histórico</span></a>
            <a href="/qrcode" class="nav-item scan-btn"><i class="fas fa-qrcode"></i></a>
            <a href="/perfil_responsavel" class="nav-item"><i class="fas fa-user-circle"></i><span>Perfil</span></a>
            <a href="/" class="nav-item"><i class="fas fa-sign-out-alt"></i><span>Sair</span></a>
        </nav>
    </div>

    <script src="../js/script.js"></script>
</body>
</html>
