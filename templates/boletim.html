<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boletim Escolar - Escola Benedito Oliveira</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <header class="page-header">
            <a href="dashboard" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <h2>Boletim Escolar</h2>
            <div style="width: 32px;"></div> </header>

        <div class="sub-tabs">
            <button class="tab-btn active">1º Bimestre</button>
            <button class="tab-btn">2º Bim</button>
            <button class="tab-btn">3º Bim</button>
            <button class="tab-btn">4º Bim</button>
        </div>

        <main class="page-content">
            
            <div class="boletim-summary-card">
                <div class="summary-item">
                    <span class="summary-label">Média Geral</span>
                    <span class="summary-value positive">8.2</span>
                </div>
                <div class="summary-divider"></div>
                <div class="summary-item">
                    <span class="summary-label">Faltas Totais</span>
                    <span class="summary-value negative">2</span>
                </div>
                <div class="summary-divider"></div>
                <div class="summary-item">
                    <span class="summary-label">Situação</span>
                    <span class="summary-status approved">Aprovado</span>
                </div>
            </div>

            <div class="grades-container">
                <div class="grades-table-header">
                    <span class="col-disciplina">Disciplina</span>
                    <span class="col-nota">Nota</span>
                    <span class="col-faltas">Faltas</span>
                </div>

                <div class="grade-row">
                    <div class="subject-info">
                        <div class="subject-icon mat"><i class="fas fa-calculator"></i></div>
                        <span>Matemática</span>
                    </div>
                    <span class="grade-value positive">8.5</span>
                    <span class="absences-value">0</span>
                </div>

                <div class="grade-row">
                    <div class="subject-info">
                        <div class="subject-icon port"><i class="fas fa-book"></i></div>
                        <span>Língua Portuguesa</span>
                    </div>
                    <span class="grade-value positive">7.8</span>
                    <span class="absences-value">1</span>
                </div>

                <div class="grade-row">
                    <div class="subject-info">
                        <div class="subject-icon cie"><i class="fas fa-flask"></i></div>
                        <span>História</span>
                    </div>
                    <span class="grade-value positive">9.0</span>
                    <span class="absences-value">0</span>
                </div>

                <div class="grade-row">
                    <div class="subject-info">
                        <div class="subject-icon geo"><i class="fas fa-globe-americas"></i></div>
                        <span>Geografia</span>
                    </div>
                    <span class="grade-value warning">5.5</span>
                    <span class="absences-value">1</span>
                </div>

                <div class="grade-row">
                    <div class="subject-info">
                        <div class="subject-icon edf"><i class="fas fa-running"></i></div>
                        <span>Educação Física</span>
                    </div>
                    <span class="grade-value positive">10.0</span>
                    <span class="absences-value">0</span>
                </div>
            </div>

        </main>

         <nav class="bottom-nav">
    <a href="/dashboard" class="nav-item">
        <i class="fas fa-home"></i>
        <span>Início</span>
    </a>
    <a href="/entrada_saida_historico" class="nav-item">
        <i class="fas fa-history"></i>
        <span>Histórico</span>
    </a>
    <a href="/qrcode" class="nav-item scan-btn">
        <i class="fas fa-qrcode"></i>
    </a>
    <a href="/perfil_responsavel" class="nav-item">
        <i class="fas fa-user-circle"></i>
        <span>Perfil</span>
    </a>
    <a href="/" class="nav-item">
        <i class="fas fa-sign-out-alt"></i>
        <span>Sair</span>
    </a>
</nav>
    </div>

    <script src="../js/script.js"></script>
</body>
</html>
